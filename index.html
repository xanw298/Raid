<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>드빌3 레이드 예약</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section id="loginCard" class="settings-card login-card">
        <div>
          <p class="eyebrow">Dragon Village 3</p>
          <h1>레이드 예약</h1>
          <p class="subcopy">구글 계정으로 로그인하고 원하는 시간대에 예약하세요.</p>
        </div>
        <div id="g_id_onload" data-client_id="YOUR_GOOGLE_CLIENT_ID" data-callback="handleGoogleCredential" data-auto_prompt="false"></div>
        <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="signin_with" data-shape="pill" data-logo_alignment="left"></div>
        <p class="hint">배포 전 Google Identity Services의 클라이언트 ID를 설정하세요.</p>
      </section>

      <section id="reservationApp" class="hidden">
        <header class="top-bar">
          <button id="prevDate" class="icon-button" type="button" aria-label="이전 날짜">‹</button>
          <div class="date-title">
            <p class="eyebrow">예약 날짜</p>
            <h1 id="dateLabel"></h1>
          </div>
          <button id="nextDate" class="icon-button" type="button" aria-label="다음 날짜">›</button>
        </header>

        <section class="settings-card profile-card">
          <div>
            <p class="label">로그인 계정</p>
            <strong id="accountName"></strong>
          </div>
          <label class="nickname-field">
            <span>닉네임</span>
            <input id="nicknameInput" type="text" maxlength="16" placeholder="게임 닉네임" />
          </label>
          <button id="saveNickname" class="primary-button" type="button">닉네임 저장</button>
          <button id="logoutButton" class="secondary-button small" type="button">로그아웃</button>
        </section>

        <p id="notice" class="notice"></p>
        <section id="tables" class="raid-grid" aria-live="polite"></section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
